<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nw Editor</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="app-shell">
      <header class="app-header" role="banner">
        <div class="header-side">
          <button
            id="menu-button"
            class="menu-icon-button"
            type="button"
            aria-label="Open menu"
            title="Settings"
          >
            ≡
          </button>
        </div>
        <h1 class="file-name" id="file-name">
          <span
            id="unsaved-indicator"
            class="unsaved-indicator"
            aria-hidden="true"
            >●</span
          >
          <span id="filename-text">untitled.txt</span>
        </h1>
        <div class="header-actions">
          <div class="focus-control" id="focus-control">
            <button
              id="focus-toggle-button"
              class="focus-icon-button"
              type="button"
              aria-label="Toggle focus mode"
              aria-pressed="false"
              title="Toggle focus mode (Ctrl/Cmd+Shift+F)"
            >
              ○
            </button>
            <button
              id="focus-menu-button"
              class="focus-menu-button"
              type="button"
              aria-label="Select focus level"
              aria-expanded="false"
              aria-controls="focus-level-menu"
              title="Choose focus level"
            >
              ⌄
            </button>
            <div
              id="focus-level-menu"
              class="focus-level-menu"
              role="menu"
              hidden
            >
              <button
                type="button"
                class="focus-level-option"
                data-focus-level="paragraph"
                role="menuitemradio"
                aria-checked="true"
              >
                Paragraph
              </button>
              <button
                type="button"
                class="focus-level-option"
                data-focus-level="sentence"
                role="menuitemradio"
                aria-checked="false"
              >
                Sentence
              </button>
            </div>
          </div>
        </div>
      </header>

      <div id="menu-screen" class="menu-screen" hidden>
        <div class="menu-header">
          <button
            id="menu-close-button"
            class="menu-close-button"
            type="button"
            aria-label="Close menu"
            title="Close"
          >
            ←
          </button>
          <h2 class="menu-title">Settings</h2>
          <div class="menu-header-spacer"></div>
        </div>

        <div class="menu-icons">
          <button
            class="menu-icon-tab active"
            data-tab="typography"
            aria-label="Typography settings"
            title="Typography"
          >
            🔤
          </button>
        </div>

        <div class="menu-divider"></div>

        <div class="menu-content">
          <div class="menu-section" data-tab="typography">
            <div class="menu-setting">
              <label class="menu-label">Font</label>
              <div class="font-options">
                <button
                  class="font-option active"
                  data-font="inter"
                  type="button"
                >
                  Inter (Sans)
                </button>
                <button
                  class="font-option"
                  data-font="plex-serif"
                  type="button"
                >
                  IBM Plex Serif
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <main class="editor-layout" role="main">
        <section class="editor-container" aria-label="Text editor">
          <div
            id="editor"
            class="editor-surface"
            contenteditable="true"
            spellcheck="false"
            aria-label="Editor content"
          ></div>
        </section>
      </main>

      <footer class="app-footer" role="contentinfo">
        <div class="footer-spacer"></div>
        <div class="footer-stats">
          <span id="word-count" class="word-count">0 words</span>
        </div>
      </footer>
    </div>
  </body>
</html>
