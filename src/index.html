<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nw Editor</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="app-shell">
      <header class="app-header" role="banner">
        <div class="header-side" aria-hidden="true"></div>
        <h1 class="file-name" id="file-name">
          <span
            id="unsaved-indicator"
            class="unsaved-indicator"
            aria-hidden="true"
            >●</span
          >
          <span id="filename-text">untitled.txt</span>
        </h1>
        <div class="header-actions">
          <div class="focus-control" id="focus-control">
            <button
              id="focus-toggle-button"
              class="focus-icon-button"
              type="button"
              aria-label="Toggle focus mode"
              aria-pressed="false"
              title="Toggle focus mode (Ctrl/Cmd+Shift+F)"
            >
              ○
            </button>
            <button
              id="focus-menu-button"
              class="focus-menu-button"
              type="button"
              aria-label="Select focus level"
              aria-expanded="false"
              aria-controls="focus-level-menu"
              title="Choose focus level"
            >
              ⌄
            </button>
            <div
              id="focus-level-menu"
              class="focus-level-menu"
              role="menu"
              hidden
            >
              <button
                type="button"
                class="focus-level-option"
                data-focus-level="paragraph"
                role="menuitemradio"
                aria-checked="true"
              >
                Paragraph
              </button>
              <button
                type="button"
                class="focus-level-option"
                data-focus-level="sentence"
                role="menuitemradio"
                aria-checked="false"
              >
                Sentence
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="editor-layout" role="main">
        <section class="editor-container" aria-label="Text editor">
          <div
            id="editor"
            class="editor-surface"
            contenteditable="true"
            spellcheck="false"
            aria-label="Editor content"
          ></div>
        </section>
      </main>

      <footer class="app-footer" role="contentinfo">
        <div class="footer-spacer"></div>
        <div class="footer-stats">
          <span id="word-count" class="word-count">0 words</span>
        </div>
      </footer>
    </div>
  </body>
</html>
